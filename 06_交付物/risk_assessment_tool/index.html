<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>工程違約金風險評估工具</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="case-panel" aria-label="案件選擇">
        <div class="brand-block">
          <p class="eyebrow">工程違約金</p>
          <h1>風險評估工具</h1>
          <p id="dataNotice" class="notice-line">讀取模型資料中</p>
        </div>

        <section class="filter-box" aria-label="篩選條件">
          <label class="field-label" for="searchInput">搜尋</label>
          <input id="searchInput" type="search" placeholder="案號、案名、法院" autocomplete="off" />

          <div class="filter-grid">
            <label>
              <span class="field-label">年度</span>
              <select id="yearFilter"></select>
            </label>
            <label>
              <span class="field-label">切分</span>
              <select id="splitFilter"></select>
            </label>
            <label>
              <span class="field-label">風險</span>
              <select id="riskFilter"></select>
            </label>
          </div>

          <div class="demo-actions" aria-label="展示快捷篩選">
            <button type="button" data-preset="high">高風險</button>
            <button type="button" data-preset="test2025">2025 測試</button>
            <button type="button" data-preset="latest2026">2026 最新</button>
            <button type="button" data-preset="clear">清除</button>
          </div>
        </section>

        <div class="list-heading">
          <span id="caseCount">0 件</span>
          <span id="selectedHint">未選取</span>
        </div>
        <div id="caseList" class="case-list" role="listbox" aria-label="案件清單"></div>
      </aside>

      <section class="workspace" aria-live="polite">
        <header class="case-header">
          <div>
            <p id="caseMeta" class="eyebrow">-</p>
            <h2 id="caseTitle">請選擇案件</h2>
            <p id="caseJid" class="jid-line">-</p>
          </div>
          <div id="riskBadge" class="risk-badge risk-low">低風險</div>
        </header>

        <section class="metrics-grid" aria-label="數值預測">
          <article class="metric-card">
            <span class="metric-label">酌減機率</span>
            <strong id="probabilityMetric">-</strong>
            <small>Logistic Regression</small>
          </article>
          <article class="metric-card">
            <span class="metric-label">預測准許比例</span>
            <strong id="remainingMetric">-</strong>
            <small>Ridge Regression</small>
          </article>
          <article class="metric-card">
            <span class="metric-label">預測酌減率</span>
            <strong id="reductionMetric">-</strong>
            <small>1 - remaining_ratio</small>
          </article>
          <article class="metric-card">
            <span class="metric-label">酌減區間</span>
            <strong id="bucketMetric">-</strong>
            <small id="riskReason">-</small>
          </article>
        </section>

        <section class="content-grid">
          <article class="panel">
            <div class="panel-title-row">
              <h3>模型比較</h3>
              <span class="panel-tag">回測對照</span>
            </div>
            <div id="modelCompare" class="model-compare"></div>
            <div id="actualCompare" class="actual-box"></div>
          </article>

          <article class="panel">
            <div class="panel-title-row">
              <h3>重要特徵</h3>
              <div class="segmented" role="tablist" aria-label="模型切換">
                <button id="tabClassification" class="segment active" data-model="logistic_regression_l2" type="button">分類</button>
                <button class="segment" data-model="ridge_regression_l2" type="button">Ridge</button>
                <button class="segment" data-model="lasso_regression_l1" type="button">Lasso</button>
              </div>
            </div>
            <div id="featureSummary" class="feature-summary"></div>
            <div id="featureList" class="feature-list"></div>
          </article>
        </section>

        <section class="panel">
          <div class="panel-title-row">
            <h3>RAG 相似案例</h3>
            <span id="similarCount" class="panel-tag">0 件</span>
          </div>
          <div id="similarCases" class="similar-list"></div>
        </section>

        <section class="review-panel">
          <h3>人工查核</h3>
          <ul>
            <li>確認金額是否為契約總價、主張違約金、法院准許違約金或其他款項。</li>
            <li>確認法院最終結論、展延、歸責、損害與使用收益等爭點。</li>
            <li>相似案例只作閱讀優先順序，不直接套用法律結論。</li>
          </ul>
        </section>
      </section>
    </main>

    <script src="assets/app.js"></script>
  </body>
</html>
